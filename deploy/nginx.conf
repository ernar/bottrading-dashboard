# Ejemplo de configuración nginx para servir el dashboard (SPA estática).
#
# El build de Vite (`npm run build`) genera `dist/`; sube SU CONTENIDO al
# directorio indicado en `root`. El bloque sirve los ficheros estáticos y hace
# *fallback* a index.html para que las rutas de React Router (/agentes, /mesa…)
# funcionen al recargar.
#
# El backend (repo ernar/BotTrading, Flask + WebSocket en :5000) corre aparte.
# Hay dos formas de que el frontend lo alcance:
#   A) URL absoluta: define VITE_API_URL al compilar (o fíjala en Ajustes). En
#      ese caso NO necesitas el proxy de abajo; basta con servir la SPA.
#   B) Mismo origen: descomenta los bloques `location /api/` y `/socket.io/`
#      para que nginx haga de proxy inverso al backend y evitar CORS. Deja
#      entonces VITE_API_URL vacío (o apuntando a este mismo dominio).

server {
    listen 80;
    server_name dashboard.tudominio.com;   # ajusta al tuyo

    # Contenido de dist/ (sube los ficheros, no la carpeta).
    root /var/www/bottrading-dashboard;
    index index.html;

    # Cache larga para los assets con hash; el HTML siempre revalida.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA: el service worker y el manifest NO deben cachearse de forma agresiva,
    # o los clientes se quedarían con una versión antigua tras desplegar.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # Fallback SPA: cualquier ruta desconocida sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Opción B: proxy al backend (mismo origen, sin CORS) ---
    # location /api/ {
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # # WebSocket (socket.io) necesita el upgrade de conexión.
    # location /socket.io/ {
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    # HTTPS: lo habitual es terminar TLS aquí (Let's Encrypt / certbot) y
    # redirigir 80 → 443. Si el dashboard va por https://, el backend TAMBIÉN
    # debe ir por https:// (un backend en http:// se bloquea por contenido mixto).
}
