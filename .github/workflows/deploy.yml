name: Deploy

# Despliegue automático del dashboard a Plesk por SFTP (SSH, puerto 22).
# Cada push a main: compila (npm run build) y sube el contenido de dist/.
# También se puede lanzar a mano desde la pestaña Actions (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita despliegues solapados si se empujan varios commits seguidos.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Las VITE_* se incrustan en tiempo de build. Se leen de
      # Settings → Secrets and variables → Actions del repo.
      # - Secrets (cifrados): VITE_AUTH_PASS, VITE_API_TOKEN
      # - Variables (texto):  VITE_API_URL, VITE_AUTH_USER
      # Si las dejas vacías: el login se desactiva y la URL del backend cae al
      # default (se puede fijar luego desde la pestaña Ajustes del dashboard).
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
          VITE_AUTH_USER: ${{ vars.VITE_AUTH_USER }}
          VITE_AUTH_PASS: ${{ secrets.VITE_AUTH_PASS }}

      # Sube SOLO el build (dist/) por SFTP con lftp (incluye dotfiles como
      # .htaccess y sube solo lo que cambió). Una sola conexión por el puerto 22:
      # sin los problemas de puertos pasivos de FTP/FTPS.
      # Requiere que el usuario tenga acceso SSH/SFTP habilitado en Plesk
      # (Suscripción → Acceso al hosting web → "Acceso al servidor por SSH").
      - name: DIAGNOSTIC - map remote filesystem (no upload)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ vars.FTP_PORT || '22' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          echo "=== TOP LEVEL (/) ==="
          lftp -c "set sftp:auto-confirm yes; open -p $SFTP_PORT -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST; cls -la /"
          echo "=== /httpdocs ==="
          lftp -c "set sftp:auto-confirm yes; open -p $SFTP_PORT -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST; cls -la /httpdocs/" || true
          echo "=== ALL index.html in chroot ==="
          lftp -c "set sftp:auto-confirm yes; open -p $SFTP_PORT -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST; find /" 2>/dev/null | grep -i "index.html" || echo "(none found / find not permitted)"
